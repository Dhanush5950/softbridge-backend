server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: softbridge-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    mail:
      username: ${MAIL_USERNAME}
      password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


jwt:
  secret: ${JWT_SECRET}
  refresh-expiration-ms: 604800000

app:
  admin:
    email: admin@softbridge.com
    password: Admin123
    firstName: Admin
    lastName: User

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:5173

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.softbridge: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

management:
  health:
    mail:
      enabled: false